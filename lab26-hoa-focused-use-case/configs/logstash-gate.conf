input {
  file {
    path => "/data/gate_logs.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
  }
}

filter {
  grok {
    match => { "message" => "%{TIMESTAMP_ISO8601:log_time} %{WORD:event_type} %{WORD:gate} %{WORD:user} %{WORD:direction}" }
  }

  date {
    match => [ "log_time", "YYYY-MM-dd'T'HH:mm:ss" ]
    target => "@timestamp"
  }

  ruby {
    code => '
      t = event.get("@timestamp")
      if t
        hour = t.time.hour
        event.set("hour", hour)
        if hour >= 0 && hour < 5
          event.tag("unusual_activity")
        end
      end
    '
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "hoa-gate-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
